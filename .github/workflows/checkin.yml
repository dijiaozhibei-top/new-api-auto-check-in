name: Daily Check-in

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

jobs:
  checkin:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create accounts file from secret
        env:
          ACCOUNTS_DATA: ${{ secrets.ACCOUNTS_DATA }}
        run: |
          echo "$ACCOUNTS_DATA" > "DTony API.txt"

      - name: Run check-in script
        env:
          NEW_API_BASE_URL: ${{ secrets.NEW_API_BASE_URL }}
        run: python checkin.py

      - name: Upload check-in result
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkin-result
          path: checkin_result.json
