name: Daily Check-in

on:
  schedule:
    - cron: "0 22 * * *"
  workflow_dispatch:

jobs:
  checkin:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        batch: [0, 1, 2, 3, 4, 5, 6]
      fail-fast: false

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -r requirements.txt
      - env:
          ACCOUNTS_DATA: ${{ secrets.ACCOUNTS_DATA }}
        run: echo "$ACCOUNTS_DATA" > "DTony API.txt"
      - env:
          NEW_API_BASE_URL: ${{ secrets.NEW_API_BASE_URL }}
          BATCH_TOTAL: 7
          BATCH_INDEX: ${{ matrix.batch }}
        run: python checkin.py
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: checkin-report-${{ matrix.batch }}
          path: checkin_result.html
          overwrite: true

  summary:
    needs: [checkin]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: checkin-report-*
          merge-multiple: true
      - run: python3 merge_reports.py
      - uses: actions/upload-artifact@v4
        with:
          name: checkin-summary
          path: checkin_summary.html
          overwrite: true
